<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vibeads | تحويل الروابط إلى فيديوهات إعلانية</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Tajawal', sans-serif; background-color: #000; color: #fff; }
        .gold-gradient { background: linear-gradient(90deg, #D4AF37 0%, #F9E27D 50%, #D4AF37 100%); }
        .gold-border { border: 1px solid #D4AF37; }
        .gold-text { color: #D4AF37; }
        .card-bg { background: #111; border: 1px solid #222; transition: 0.3s; }
        .card-bg:hover { border-color: #D4AF37; transform: translateY(-5px); }
        .avatar-selected { border: 3px solid #D4AF37; box-shadow: 0 0 15px rgba(212, 175, 55, 0.5); }
    </style>
</head>
<body class="bg-black">

    <nav class="p-6 border-b border-zinc-800 flex justify-between items-center">
        <div class="text-3xl font-bold gold-text tracking-tighter">VIBEADS</div>
        <div class="hidden md:flex gap-8 text-sm">
            <a href="#" class="hover:text-[#D4AF37]">الرئيسية</a>
            <a href="#" class="hover:text-[#D4AF37]">كيف يعمل؟</a>
            <a href="#" class="hover:text-[#D4AF37]">الأسعار</a>
        </div>
        <button class="gold-gradient text-black px-6 py-2 rounded-full font-bold text-sm">ابدأ الآن</button>
    </nav>

    <section class="max-w-6xl mx-auto px-6 py-16 text-center">
        <h1 class="text-5xl md:text-7xl font-bold mb-6">اصنع إعلانك <span class="gold-text">بلمسة خليجية</span></h1>
        <p class="text-zinc-400 text-xl mb-12 max-w-2xl mx-auto">حول أي رابط منتج إلى فيديو ترويجي احترافي باستخدام الذكاء الاصطناعي وشخصيات عربية واقعية.</p>

        <div class="max-w-3xl mx-auto bg-[#111] p-2 rounded-2xl border border-zinc-800 flex flex-col md:flex-row gap-2">
            <input id="videoUrl" type="url" placeholder="ضع رابط المنتج هنا (أمازون، سلة، زد...)" 
                   class="flex-1 bg-transparent p-4 outline-none text-white text-right">
            <button onclick="generateVideo()" class="gold-gradient text-black px-10 py-4 rounded-xl font-bold text-lg hover:opacity-90 transition">
                توليد الفيديو
            </button>
        </div>

        <div id="statusBox" class="hidden mt-8 max-w-xl mx-auto p-4 rounded-xl border border-dashed border-[#D4AF37] bg-zinc-900/50">
            <div class="flex items-center justify-center gap-3">
                <div class="animate-spin rounded-full h-5 w-5 border-b-2 border-[#D4AF37]"></div>
                <p id="statusText" class="gold-text font-medium">جاري تحليل الرابط...</p>
            </div>
        </div>
    </section>

    <section class="max-w-6xl mx-auto px-6 py-12">
        <h2 class="text-2xl font-bold mb-8 flex items-center gap-3">
            <span class="w-8 h-[2px] gold-gradient"></span>
            اختر الشخصية (الأفاتار)
        </h2>
        <div class="grid grid-cols-2 md:grid-cols-4 gap-6">
            <div class="card-bg rounded-2xl p-4 text-center cursor-pointer avatar-selected">
                <div class="w-full h-48 bg-zinc-800 rounded-xl mb-4 overflow-hidden">
                    <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=Faisal" alt="Faisal" class="w-full h-full object-cover">
                </div>
                <h3 class="font-bold">فيصل (خالجي)</h3>
                <p class="text-xs text-zinc-500">صوت رسمي - هادئ</p>
            </div>
            <div class="card-bg rounded-2xl p-4 text-center cursor-pointer">
                <div class="w-full h-48 bg-zinc-800 rounded-xl mb-4 overflow-hidden">
                    <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=Noura" alt="Noura" class="w-full h-full object-cover">
                </div>
                <h3 class="font-bold">نورة (نجدية)</h3>
                <p class="text-xs text-zinc-500">صوت حيوي - تسويقي</p>
            </div>
            </div>
    </section>

    <footer class="border-t border-zinc-900 py-12 text-center text-zinc-500 text-sm">
        <p>&copy; 2026 Vibeads. جميع الحقوق محفوظة.</p>
    </footer>

    <script>
        async function generateVideo() {
            const urlInput = document.getElementById('videoUrl').value;
            const statusBox = document.getElementById('statusBox');
            const statusText = document.getElementById('statusText');

            if (!urlInput) {
                alert('الرجاء وضع رابط أولاً');
                return;
            }

            statusBox.classList.remove('hidden');
            statusText.innerText = 'تم الاستلام! المصنع (n8n) بدأ العمل...';

            try {
                const response = await fetch('https://ileopard77.app.n8n.cloud/webhook/vibeads-v5', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ url: urlInput })
                });

                if (response.ok) {
                    statusText.innerText = 'جاري رندرة الفيديو.. قد يستغرق الأمر دقيقة';
                } else {
                    statusText.innerText = 'حدث خطأ في الاتصال بالمصنع';
                }
            } catch (error) {
                statusText.innerText = 'خطأ: تأكد من تشغيل الـ Webhook في n8n';
            }
        }
    </script>
</body>
</html>
