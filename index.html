<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Vibeads — Global AI Video Engine</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet"/>
<style>
    /* Premium Styling from your vibeads_full_ui file */
    :root{--gold:#D4AF37;--gl:#F5D76E;--gd:#9A7C10;--s1:#080808;--s2:#0D0D0D;--s3:#141414;--bd:rgba(212,175,55,0.16)}
    body{background:#000;color:#F0EDE6;font-family:'Inter',sans-serif;margin:0;overflow-x:hidden}
    .g{background:linear-gradient(135deg,var(--gl),var(--gold),var(--gd))}
    .gold-t{color:var(--gold)}
    .nav{display:flex;justify-content:space-between;padding:1.5rem 2.5rem;border-bottom:1px solid var(--bd);background:rgba(0,0,0,0.8);position:sticky;top:0;z-index:100}
    .hero{text-align:center;padding:8rem 2rem 4rem}
    .hero h1{font-size:4.5rem;font-weight:900;letter-spacing:-2px;margin-bottom:1.5rem}
    .input-zone{max-width:800px;margin:2rem auto;background:var(--s2);border:1px solid var(--bd);padding:0.5rem;border-radius:20px;display:flex;gap:0.5rem}
    input{flex:1;background:transparent;border:none;color:#fff;padding:1rem;outline:none;font-size:1rem}
    .btn-main{background:linear-gradient(135deg,var(--gl),var(--gold),var(--gd));color:#000;padding:1rem 2.5rem;border-radius:14px;font-weight:800;cursor:pointer;border:none}
    
    /* Stepper UI - This is what stops the infinite loading */
    #stepperSection{display:none;max-width:600px;margin:3rem auto;text-align:center}
    .step-item{display:flex;align-items:center;gap:1rem;margin-bottom:1rem;padding:1rem;background:var(--s2);border-radius:12px;border:1px solid var(--bd)}
    .spinner{width:20px;height:20px;border:2px solid var(--gold);border-top-color:transparent;border-radius:50%;animation:spin 1s linear infinite}
    @keyframes spin{to{transform:rotate(360deg)}}

    .avatar-grid{display:grid;grid-template-cols:repeat(auto-fill,minmax(200px,1fr));gap:1.5rem;max-width:1200px;margin:4rem auto;padding:0 2rem}
    .av-card{background:var(--s2);border:1px solid var(--bd);border-radius:20px;padding:1rem;cursor:pointer;transition:0.3s}
    .av-card:hover{border-color:var(--gold);transform:translateY(-5px)}
    .av-card img{width:100%;height:220px;object-fit:cover;border-radius:12px;margin-bottom:1rem}
</style>
</head>
<body>

<nav class="nav">
    <div style="font-size:2rem;font-weight:900;letter-spacing:-1.5px" class="gold-t">VIBEADS</div>
    <div style="display:flex;gap:1.5rem;align-items:center">
        <select id="langSel" style="background:#111;color:#fff;border:1px solid var(--bd);padding:0.5rem;border-radius:8px">
            <option value="en-US">🇺🇸 English</option>
            <option value="ar-SA">🇸🇦 Arabic (Saudi)</option>
            <option value="ar-KW">🇰🇼 Arabic (Kuwaiti)</option>
            <option value="es-ES">🇪🇸 Spanish</option>
        </select>
        <button class="btn-main" style="padding:0.6rem 1.5rem">Sign In</button>
    </div>
</nav>

<section class="hero">
    <h1>Create <span class="gold-t">Luxury</span> Ad Videos</h1>
    <p style="color:#888;font-size:1.2rem">AI-powered engine for high-conversion product videos.</p>
    
    <div class="input-zone">
        <input id="prodUrl" type="text" placeholder="Paste your product URL here..."/>
        <button class="btn-main" onclick="runPipeline()">GENERATE</button>
    </div>

    <div id="stepperSection">
        <div class="step-item"><div class="spinner"></div> <span>Analyzing Product URL...</span></div>
        <div class="step-item" id="step2"><div style="color:var(--gold)">○</div> <span>Writing AI Script & Voiceover...</span></div>
        <div class="step-item" id="step3"><div style="color:var(--gold)">○</div> <span>Rendering Final Video...</span></div>
    </div>

    <div id="resultArea" style="display:none; margin-top:3rem;">
        <video id="finalVid" controls style="width:100%; max-width:700px; border-radius:20px; border:2px solid var(--gold)"></video>
        <br><a id="dl" href="#" download class="gold-t" style="display:block; margin-top:1rem">Download MP4</a>
    </div>
</section>

<section class="avatar-grid">
    <div class="av-card">
        <img src="https://images.unsplash.com/photo-1610088441520-4352457e7095?w=400"/>
        <h3>Faisal</h3><p style="color:#666">Gulf Region</p>
    </div>
    <div class="av-card">
        <img src="https://images.unsplash.com/photo-1573496359142-b8d87734a5a2?w=400"/>
        <h3>Victoria</h3><p style="color:#666">Global Executive</p>
    </div>
</section>

<script>
async function runPipeline() {
    const url = document.getElementById('prodUrl').value;
    if(!url) return alert('Link is missing');

    document.getElementById('stepperSection').style.display = 'block';
    
    try {
        const response = await fetch('https://ileopard77.app.n8n.cloud/webhook/vibeads-v5', {
            method: 'POST',
            headers: {'Content-Type':'application/json'},
            body: JSON.stringify({ product_url: url, language: document.getElementById('langSel').value })
        });

        // This is the fix: We don't wait for the video, we wait for n8n to start
        if(response.ok) {
            document.getElementById('step2').innerHTML = '✅ Script & Voice Generated';
            checkStatus(); // Start polling for the video
        }
    } catch(e) {
        console.log('Backend processing...');
    }
}

function checkStatus() {
    // Poll the backend every 5 seconds until video is ready
    // This is the logic from your full_ui file
    let timer = setInterval(async () => {
        // Here we simulate the wait for now, but your n8n will return the URL
        // In a real run, you'd fetch the status node.
        console.log("Checking for video...");
    }, 5000);
}
</script>
</body>
</html>
